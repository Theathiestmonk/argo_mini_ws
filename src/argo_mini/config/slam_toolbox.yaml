slam_toolbox:
  ros__parameters:
    odom_frame:   odom
    map_frame:    map
    base_frame:   base_link
    scan_topic:   /scan_corrected   # timestamp-corrected scan from scan_relay
    mode:         localization
    use_sim_time: false

    # map_file_name is set at launch time via nav.launch.py (map:= argument).
    # It must point to the .posegraph file saved during the mapping session
    # (pass the path WITHOUT the .posegraph extension).
    map_file_name: ""

    resolution:      0.05
    max_laser_range: 6.0

    # Tighter update cadence for responsive localization
    minimum_travel_distance: 0.05
    minimum_travel_heading:  0.017   # ~1 degree

    # Map publish less often — it is static in localization mode
    map_update_interval: 2.0

    use_scan_matching:    true
    use_scan_barycenter:  true

    # Smaller buffer — localization only needs recent scans
    scan_buffer_size:                  10
    scan_buffer_maximum_scan_distance: 6.0

    # Loop closing wastes CPU in localization mode — disable
    do_loop_closing: false

    distance_variance_penalty: 0.5
    angle_variance_penalty:    1.0

    # Disable interactive mode in production (saves resources)
    enable_interactive_mode: false
